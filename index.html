<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Puzzle Quest</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="ai-bg"></div>

  <main class="page home-page">
    <section class="hero-card">
      <div class="ai-orb"></div>

      <h1>AI Puzzle Quest</h1>
      <p class="tagline">Solve 4 futuristic AI puzzles and unlock your final score.</p>

      <div class="thinking-box">
        <span>AI Thinking</span>
        <div class="dots">
          <i></i><i></i><i></i>
        </div>
      </div>

      <div class="info-grid">
        <div class="info-card">4 Smart Puzzles</div>
        <div class="info-card">Text Box Answers</div>
        <div class="info-card">Final Score Page</div>
        <div class="info-card">Mobile Friendly</div>
      </div>

      <button class="main-btn" onclick="startGame()">Start Game</button>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
